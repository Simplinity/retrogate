name: RetroGate
options:
  bundleIdPrefix: com.brunowernimont
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: "2.65.0"
  swift-nio-extras:
    url: https://github.com/apple/swift-nio-extras.git
    from: "1.22.0"
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.3.0"
  swift-log:
    url: https://github.com/apple/swift-log.git
    from: "1.5.0"

targets:
  RetroGate:
    type: application
    platform: macOS
    sources:
      - path: Sources/RetroGate
        excludes:
          - "**/.DS_Store"
      - path: Sources/ProxyServer
        excludes:
          - "**/.DS_Store"
      - path: Sources/HTMLTranscoder
        excludes:
          - "**/.DS_Store"
      - path: Sources/ImageTranscoder
        excludes:
          - "**/.DS_Store"
      - path: Sources/WaybackBridge
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brunowernimont.retrogate
        PRODUCT_NAME: RetroGate
        INFOPLIST_FILE: Sources/RetroGate/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/RetroGate/RetroGate.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: YES
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - package: swift-nio
        product: NIO
      - package: swift-nio
        product: NIOHTTP1
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio-extras
        product: NIOExtras
      - package: SwiftSoup
      - package: swift-argument-parser
        product: ArgumentParser
      - package: swift-log
        product: Logging
      - sdk: libsqlite3.tbd

  RetroGateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/RetroGateTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RetroGate
